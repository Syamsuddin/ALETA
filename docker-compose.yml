version: '3.8'

networks:
  aleta_network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  neo4j_data:
    driver: local
  redis_data:
    driver: local
  ollama_data:
    driver: local
  keycloak_data:
    driver: local
  vector_db_data:
    driver: local
  backups:
    driver: local

services:
  # 1. DATABASE RELASIONAL TERPUSAT (POSTGRESQL)
  aleta_postgres:
    image: postgres:15-alpine
    container_name: aleta_postgres
    restart: always
    environment:
      POSTGRES_USER: aleta_admin
      POSTGRES_PASSWORD: ${ALETA_POSTGRES_PASSWORD}
      POSTGRES_DB: aleta_master_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aleta_network
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aleta_admin -d aleta_master_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. DATABASE GRAFIK KURIKULUM MERDEKA (NEO4J)
  aleta_neo4j:
    image: neo4j:5.12-community
    container_name: aleta_neo4j
    restart: always
    environment:
      NEO4J_AUTH: neo4j/${ALETA_NEO4J_PASSWORD}
    volumes:
      - neo4j_data:/data
    networks:
      - aleta_network
    deploy:
      resources:
        limits:
          memory: 3G
          cpus: '1.5'
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p \"$ALETA_NEO4J_PASSWORD\" 'RETURN 1'"]
      interval: 15s
      timeout: 10s
      retries: 3

  # 3. PENYIMPANAN SESI BELAJAR REAL-TIME (REDIS)
  aleta_redis:
    image: redis:7-alpine
    container_name: aleta_redis
    restart: always
    command: redis-server --requirepass ${ALETA_REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - aleta_network
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${ALETA_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # 4. INTELIGENCE HUB / LOCAL LLM ENGINE (OLLAMA)
  aleta_ollama:
    image: ollama/ollama:latest
    container_name: aleta_ollama
    restart: always
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - aleta_network
    deploy:
      resources:
        limits:
          memory: 12G  # 8 GB model + 4 GB context window
          cpus: '4.0'

  # 5. CORE API BACKEND SERVICE (LAYER 2 ARCHITECTURE)
  aleta_core_api:
    build:
      context: ./backend_core
      dockerfile: Dockerfile
    container_name: aleta_core_api
    restart: always
    environment:
      - DATABASE_URL=postgresql://aleta_admin:${ALETA_POSTGRES_PASSWORD}@aleta_postgres:5432/aleta_master_db
      - REDIS_URL=redis://:${ALETA_REDIS_PASSWORD}@aleta_redis:6379/0
      - NEO4J_URI=bolt://aleta_neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${ALETA_NEO4J_PASSWORD}
      - KEYCLOAK_URL=http://aleta_keycloak:8080
      - AI_ENGINE_URL=http://aleta_ai_engine:8000
    depends_on:
      aleta_postgres:
        condition: service_healthy
      aleta_neo4j:
        condition: service_healthy
    networks:
      - aleta_network
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # 6. IDENTITY PROVIDER (KEYCLOAK SSO)
  aleta_keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: aleta_keycloak
    restart: always
    command: ["start", "--import-realm", "--proxy", "edge", "--hostname-strict=false"]
    environment:
      KEYCLOAK_ADMIN: ${ALETA_KEYCLOAK_ADMIN_USER}
      KEYCLOAK_ADMIN_PASSWORD: ${ALETA_KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://aleta_postgres:5432/aleta_master_db
      KC_DB_SCHEMA: aleta_keycloak_schema
      KC_DB_USERNAME: aleta_admin
      KC_DB_PASSWORD: ${ALETA_POSTGRES_PASSWORD}
      KC_HEALTH_ENABLED: "true"
    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./infrastructure/keycloak:/opt/keycloak/data/import:ro
    depends_on:
      aleta_postgres:
        condition: service_healthy
    networks:
      - aleta_network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/health/ready || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8

  # 7. AI ENGINE (BKT + RAG ORCHESTRATOR)
  aleta_ai_engine:
    build:
      context: ./ai_engine
      dockerfile: Dockerfile
    container_name: aleta_ai_engine
    restart: always
    environment:
      - DATABASE_URL=postgresql://aleta_admin:${ALETA_POSTGRES_PASSWORD}@aleta_postgres:5432/aleta_master_db
      - NEO4J_URI=bolt://aleta_neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=${ALETA_NEO4J_PASSWORD}
      - OLLAMA_URL=http://aleta_ollama:11434
      - VECTOR_DB_URL=http://aleta_vector_db:6333
      - REDIS_URL=redis://:${ALETA_REDIS_PASSWORD}@aleta_redis:6379/1
    depends_on:
      aleta_postgres:
        condition: service_healthy
      aleta_neo4j:
        condition: service_healthy
    networks:
      - aleta_network
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '2.0'
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/internal/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # 8. VECTOR DB UNTUK RAG (QDRANT)
  aleta_vector_db:
    image: qdrant/qdrant:v1.9.2
    container_name: aleta_vector_db
    restart: always
    volumes:
      - vector_db_data:/qdrant/storage
    networks:
      - aleta_network
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: '1.0'
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  # 9. DASHBOARD WEB GURU
  aleta_teacher_dashboard:
    build:
      context: ./teacher_dashboard_web
      dockerfile: Dockerfile
    container_name: aleta_teacher_dashboard
    restart: always
    networks:
      - aleta_network

  # 10. DASHBOARD WEB ADMIN YAYASAN
  aleta_admin_dashboard:
    build:
      context: ./admin_dashboard_web
      dockerfile: Dockerfile
    container_name: aleta_admin_dashboard
    restart: always
    networks:
      - aleta_network

  # 11. REVERSE PROXY & SECURITY SENTRY (NGINX EXPOSER)
  aleta_api_gateway:
    image: nginx:alpine
    container_name: aleta_api_gateway
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infrastructure/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infrastructure/nginx/snippets:/etc/nginx/snippets:ro
      - ./infrastructure/nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - aleta_core_api
      - aleta_keycloak
      - aleta_teacher_dashboard
      - aleta_admin_dashboard
    networks:
      - aleta_network
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -f http://localhost:80 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  # 12. JOB CADANGAN POSTGRES + NEO4J (cron harian)
  aleta_backup:
    image: offen/docker-volume-backup:v2.43.0
    container_name: aleta_backup
    restart: always
    environment:
      BACKUP_CRON_EXPRESSION: "0 2 * * *"
      BACKUP_FILENAME: "aleta-backup-%Y%m%dT%H%M%S.tar.gz"
      BACKUP_RETENTION_DAYS: "30"
      BACKUP_ENCRYPTION_PASSPHRASE: ${ALETA_BACKUP_PASSPHRASE}
    volumes:
      - postgres_data:/backup/postgres_data:ro
      - neo4j_data:/backup/neo4j_data:ro
      - keycloak_data:/backup/keycloak_data:ro
      - vector_db_data:/backup/vector_db_data:ro
      - backups:/archive
    networks:
      - aleta_network
