events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    client_max_body_size 10m;
    proxy_connect_timeout 10s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;

    # Upstreams matching docker service names and internal ports
    upstream core_api_server      { server aleta_core_api:8000; }
    upstream keycloak_server      { server aleta_keycloak:8080; }
    upstream teacher_dashboard    { server aleta_teacher_dashboard:80; }
    upstream admin_dashboard      { server aleta_admin_dashboard:80; }

    # Redirect all HTTP traffic to HTTPS
    server {
        listen 80 default_server;
        server_name aleta.localhost *.aleta.localhost;
        return 301 https://$host$request_uri;
    }

    # API Publik: api.aleta.localhost
    server {
        listen 443 ssl;
        server_name api.aleta.localhost;

        ssl_certificate /etc/nginx/certs/aleta_fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/aleta_privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        include /etc/nginx/snippets/security_headers.conf;

        # SSE-friendly upstream for Tutor chatbot streaming
        location /api/v1/tutor/chat {
            proxy_pass http://core_api_server;
            include /etc/nginx/snippets/sse.conf;
        }

        location / {
            proxy_pass http://core_api_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Keycloak SSO Identity Provider: auth.aleta.localhost
    server {
        listen 443 ssl;
        server_name auth.aleta.localhost;

        ssl_certificate /etc/nginx/certs/aleta_fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/aleta_privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://keycloak_server;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # Guru Dashboard SPA: guru.aleta.localhost
    server {
        listen 443 ssl;
        server_name guru.aleta.localhost;

        ssl_certificate /etc/nginx/certs/aleta_fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/aleta_privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        add_header Content-Security-Policy "default-src 'self'; connect-src 'self' https://api.aleta.localhost https://auth.aleta.localhost" always;
        include /etc/nginx/snippets/security_headers.conf;

        location / {
            proxy_pass http://teacher_dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }

    # Admin Yayasan Dashboard SPA: admin.aleta.localhost
    server {
        listen 443 ssl;
        server_name admin.aleta.localhost;

        ssl_certificate /etc/nginx/certs/aleta_fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/aleta_privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        include /etc/nginx/snippets/security_headers.conf;

        location / {
            proxy_pass http://admin_dashboard;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
